<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Tatacoa Verde</title>
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
    <link rel="stylesheet" href="css/login.css">
</head>
<body>

    <section class="hero">
        <div class="hero-left">

            <div class="logo-box">
                <img src="assets/img/logo.png" alt="Tatacoa Verde">
            </div>

            <div class="hero-info">
                <h1>Sistema de Gestión Turística</h1>

                <ul>
                    <li>✓ Control total de reservas</li>
                    <li>✓ Gestión de tours y guías</li>
                    <li>✓ Administración completa</li>
                </ul>
            </div>

        </div>
        <div class="hero-right">

            <div class="login-content">

                <h2>Iniciar Sesión</h2>
                <p>Accede al panel de administración</p>
                
                <form>

                    <div class="input-group">
                        <label for="email">
                            <i class="fa-regular fa-envelope"></i>
                            Correo Electrónico
                        </label>

                        <input type="email" id="email" name="email" placeholder="tu@correo.com" autocomplete="email">
                    </div>

                    <div class="input-group">
                        <label for="password">
                            <i class="fa-solid fa-lock"></i>
                            Contraseña
                        </label>

                        <div class="password-box">
                            <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password">

                            <i class="fa-regular fa-eye"></i>
                        </div>
                    </div>

                    <button type="submit">
                        Iniciar Sesión
                    </button>

                </form>

            </div>

        </div>

    </section>
    <script src="js/login.js"></script>
</body>
</html>
